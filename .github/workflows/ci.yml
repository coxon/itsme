name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 最小权限：CI 只需读代码，不写任何东西
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync --extra dev
      - name: Lint
        run: |
          if [ -f pyproject.toml ]; then
            uv run ruff check .
            uv run ruff format --check .
          else
            echo "No Python project yet — skipping lint."
          fi

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync deps
        # Pre-creates .venv so the smoke-shim subprocess tests
        # (which spawn `uv run --project ${CLAUDE_PLUGIN_ROOT}`)
        # reuse the cached venv instead of re-syncing on each fire.
        run: uv sync --extra dev
      - name: Run tests
        run: |
          if [ -f pyproject.toml ]; then
            uv run pytest
          else
            echo "No Python project yet — skipping tests."
          fi
