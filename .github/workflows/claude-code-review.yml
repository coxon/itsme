name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            You are reviewing a PR for the **itsme** project — a long-term memory plugin for agent IDEs.

            Review priorities (in order):
            1. **Branch & commit hygiene** — PR must come from a feature/* branch, commits should follow Conventional Commits.
            2. **Doc-code consistency** — if architecture changed, docs/ARCHITECTURE.md must be updated; if scope changed, docs/ROADMAP.md.
            3. **Locked decisions respected** — see CLAUDE.md "已锁的设计决策" section. Flag any deviation.
            4. **Code quality** — Python style (ruff), type hints (mypy), test coverage, edge cases.
            5. **Security** — no secrets in code, no hardcoded paths.

            Be terse and specific. Suggest concrete diffs when possible.
